{% extends 'tweets/base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="card" style="max-width:400px;margin:40px auto;">
    <h2 style="margin-bottom:16px;">Login to Tweeter</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary" style="width:100%;">Login</button>
    </form>
    <p style="margin-top:12px;text-align:center;">Don't have an account? <a href="{% url 'register' %}">Sign Up</a></p>
</div>
{% endblock %}
