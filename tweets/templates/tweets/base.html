<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Tweeter{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f7f9fa; color: #14171a; }
        nav { background: #1da1f2; color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        nav a { color: white; text-decoration: none; font-weight: bold; margin-left: 16px; }
        nav a:hover { text-decoration: underline; }
        .container { max-width: 600px; margin: 20px auto; padding: 0 16px; }
        .card { background: white; border: 1px solid #e1e8ed; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
        .btn { display: inline-block; padding: 8px 20px; border-radius: 20px; border: none; cursor: pointer; font-size: 14px; font-weight: bold; }
        .btn-primary { background: #1da1f2; color: white; }
        .btn-primary:hover { background: #1991db; }
        .btn-danger { background: #e0245e; color: white; }
        .btn-outline { background: transparent; border: 1px solid #1da1f2; color: #1da1f2; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #e1e8ed; border-radius: 8px; font-size: 15px; margin-bottom: 10px; }
        .messages { list-style: none; }
        .messages li { background: #e8f5e9; border-left: 4px solid #4caf50; padding: 10px; margin-bottom: 8px; border-radius: 4px; }
        .tweet-meta { font-size: 13px; color: #657786; margin-bottom: 6px; }
        .tweet-content { font-size: 16px; margin-bottom: 10px; }
        .tweet-actions { display: flex; gap: 16px; }
        .tweet-actions a { color: #657786; font-size: 13px; text-decoration: none; }
        .tweet-actions a:hover { color: #1da1f2; }
        .avatar { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; }
        .tweet-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    </style>
</head>
<body>
<nav>
    <a href="{% url 'home' %}" style="font-size:20px;">🐦 Tweeter</a>
    <div>
        {% if user.is_authenticated %}
            <a href="{% url 'explore' %}">Explore</a>
            <a href="{% url 'profile' user.username %}">@{{ user.username }}</a>
            <a href="{% url 'logout' %}">Logout</a>
        {% else %}
            <a href="{% url 'login' %}">Login</a>
            <a href="{% url 'register' %}">Sign Up</a>
        {% endif %}
    </div>
</nav>
<div class="container">
    {% if messages %}
        <ul class="messages">
            {% for message in messages %}<li>{{ message }}</li>{% endfor %}
        </ul>
    {% endif %}
    {% block content %}{% endblock %}
</div>
</body>
</html>
